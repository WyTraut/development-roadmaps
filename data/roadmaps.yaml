roadmaps:
  - id: network_automation
    name: Network Automation
    short_name: Network
    summary: Reduce activation overhead, failure rates, activation time, and repetitive work through increasingly automated circuit delivery.
    accent: emerald
    icon: network
    stages:
      - id: foundation
        label: Foundation
        name: Network Audits
        summary: Automate network auditing to understand current provisioning patterns and identify recurring quality issues.
        work_packages: [network_audits]
        deliverables:
          - A live dashboard displaying circuit issues, KPIs, and audit results.
          - Consistent network configurations resulting in less activation time and less Day 2 involvement.
          - Alerts for configurations that may cause HEOs, including duplicate IPs and circuits outside the routing instance.
        kpis:
          - label: Network review
            target: Comprehensive automated review and auditing
            context: Current baseline is no review or a Day-2 review.
          - label: Individual quality review
            target: Full quality review
            context: Current baseline is task-based measurement without a quality review.
        impact: { efficiency: 2, risk_reduction: 4, decision_visibility: 5, scalability: 5 }
        risks:
          - Blind reliance on data outputs could disrupt current day-to-day procedures.
          - Incomplete source data or false positives could create misleading quality conclusions without a review process.
      - id: scale
        label: Scale
        name: Tools for Workflow Replacement
        summary: Remove manual provisioning work from circuit delivery with a comprehensive workflow used across network teams.
        work_packages: [workflow_replacement_tools]
        deliverables:
          - Comprehensive tool used by all network teams.
          - Reporting on value gained.
          - No reduction in activation success or quality.
        kpis:
          - label: Hours spent per activation
            target: 30-50% reduction for workflows moved into the tool
            context: Establish the current hours-per-activation baseline during workflow discovery.
          - label: Manual handoffs per activation
            target: 50-70% reduction for standard circuits
            context: Count copy-and-paste steps and system handoffs in the current design-to-activation process.
        impact: { efficiency: 5, risk_reduction: 4, decision_visibility: 4, scalability: 5 }
        risks:
          - Required database and system APIs may not be available or supported on the expected timeline.
          - Workflow variations across teams could drive scope growth and slow adoption of a common process.
      - id: full
        label: Full Vision
        name: Closed-loop Operations
        summary: Automate standard circuit delivery from approved design through validation, with people focused on approvals and exceptions.
        work_packages: [automated_circuit_delivery]
        deliverables:
          - End-to-end automation for the highest-volume standard circuit types.
          - Policy-based approvals and exception routing for nonstandard requests.
          - Automated prechecks, post-activation validation, status updates, and rollback guidance.
        kpis:
          - label: Automated delivery coverage
            target: 70-85% of standard circuit activations
            context: Coverage excludes bespoke designs and conditions that require engineering judgment.
          - label: Activation lead time
            target: 50-70% reduction for automated circuit types
            context: Maintain or improve the current activation success and quality rate.
        impact: { efficiency: 5, risk_reduction: 4, decision_visibility: 5, scalability: 5 }
        risks:
          - A defective automation rule could repeat an error across many circuits before detection.
          - Vendor differences, legacy platforms, and uncommon circuit designs may limit achievable automation coverage.

  - id: reporting
    name: Reporting
    short_name: Reporting
    summary: Create a trusted view of operational performance so leaders and teams can answer questions quickly, consistently, and with less manual preparation.
    accent: blue
    icon: reporting
    stages:
      - id: foundation
        label: Foundation
        name: Unified Data
        summary: Establish common KPI definitions and automated data feeds for activation, quality, workload, and network performance.
        work_packages: [reporting_foundation_placeholder]
        deliverables:
          - A prioritized source inventory and an owner-approved operational metric dictionary.
          - Automated data feeds and a governed model for activation, quality, workload, and network measures.
          - A certified executive dataset with freshness, completeness, and reconciliation checks.
        kpis:
          - label: Data freshness
            target: Daily refresh for core KPIs; near-real-time where source systems support it
            context: Current reporting is assumed to use a mix of manual extracts and inconsistent refresh schedules.
          - label: Governed KPI coverage
            target: 100% of executive KPIs have an approved definition, owner, and source
            context: Begin with the measures used in recurring operating and executive reviews.
        impact: { efficiency: 3, risk_reduction: 3, decision_visibility: 5, scalability: 4 }
        risks:
          - Source-system access, data quality, or undocumented fields may delay reliable feeds.
          - Teams may disagree on metric definitions or ownership, preventing a single trusted view.
      - id: scale
        label: Scale
        name: Self-service Reporting
        summary: Give leaders and operators governed dashboards and drill-downs for common questions without relying on custom report requests.
        work_packages: [reporting_scale_placeholder]
        deliverables:
          - Role-based dashboards for executives, service-delivery leaders, and operating teams.
          - Drill-down paths from portfolio KPIs to the responsible workflow, team, or circuit.
          - Scheduled subscriptions and threshold alerts for recurring performance reviews.
        kpis:
          - label: Report preparation effort
            target: 60-80% reduction for recurring operating reports
            context: Measure analyst and manager time spent extracting, reconciling, formatting, and validating reports.
          - label: Common-question turnaround
            target: Immediate for certified dashboard questions; within one business day for new analysis
            context: Track frequently repeated requests separately from genuinely new analytical work.
        impact: { efficiency: 4, risk_reduction: 3, decision_visibility: 5, scalability: 4 }
        risks:
          - Users may misinterpret self-service data without clear definitions, context, and access controls.
          - Unmanaged dashboard growth could recreate conflicting reports and increase support effort.
      - id: full
        label: Full Vision
        name: Predictive Insights
        summary: Forecast workload and surface likely delivery, quality, or capacity issues early enough for leaders to act.
        work_packages: [reporting_full_placeholder]
        deliverables:
          - Workload and capacity forecasts with documented confidence ranges.
          - Risk scoring for likely activation delays, quality issues, and missed operating targets.
          - Driver analysis and early-warning alerts linked back to the underlying operational data.
        kpis:
          - label: Forecast accuracy
            target: 80-90% within the agreed planning horizon
            context: Final accuracy and horizon depend on historical data volume, consistency, and seasonality.
          - label: Operational early warning
            target: Identify material capacity or SLA risk 2-4 weeks before impact
            context: Validate alerts against actual outcomes and tune thresholds to control false positives.
        impact: { efficiency: 4, risk_reduction: 4, decision_visibility: 5, scalability: 5 }
        risks:
          - Limited or inconsistent historical data may not support reliable forecasting for every workflow.
          - Model drift, false confidence, or unexplained predictions could lead leaders to make poor planning decisions.

  - id: audit_automation
    name: Audit Automation
    short_name: Audit
    summary: Reduce evidence-gathering effort and control blind spots by making ownership, evidence, testing, and exceptions continuously visible.
    accent: amber
    icon: audit
    stages:
      - id: foundation
        label: Foundation
        name: Control Mapping
        summary: Map priority controls to accountable owners, systems, required evidence, review frequency, and known gaps.
        work_packages: [audit_foundation_placeholder]
        deliverables:
          - A prioritized control catalog with clear business and technical ownership.
          - Mappings from each priority control to its systems, evidence, frequency, and retention requirement.
          - A visible gap register with remediation owners and target dates.
        kpis:
          - label: Priority control coverage
            target: 90-100% mapped to an owner, system, and evidence source
            context: Prioritize controls with repeated evidence requests, known findings, or material business risk.
          - label: Evidence ownership
            target: 100% of mapped controls have a primary and backup evidence owner
            context: Ownership includes responsibility for resolving missing, stale, or rejected evidence.
        impact: { efficiency: 3, risk_reduction: 4, decision_visibility: 4, scalability: 4 }
        risks:
          - Outdated process documentation may produce incomplete mappings or miss informal control activities.
          - Control owners, auditors, and system teams may interpret evidence requirements differently.
      - id: scale
        label: Scale
        name: Continuous Evidence
        summary: Automatically collect and retain source-linked evidence, then route missing or stale items to accountable owners.
        work_packages: [audit_scale_placeholder]
        deliverables:
          - Automated evidence connectors for the highest-priority systems and controls.
          - A governed evidence repository with timestamps, source lineage, access controls, and retention rules.
          - Exception workflows with ownership, due dates, escalation, and remediation status.
        kpis:
          - label: Evidence collection effort
            target: 50-70% reduction for connected priority controls
            context: Compare annual hours spent requesting, locating, validating, and packaging evidence.
          - label: Evidence freshness
            target: 80-90% of priority evidence available within its required collection window
            context: Exclude controls that cannot be automated until the source system or process changes.
        impact: { efficiency: 5, risk_reduction: 4, decision_visibility: 4, scalability: 5 }
        risks:
          - Security approvals, API limits, and inconsistent source-system retention may block automated collection.
          - Missing context or failed connectors could create false confidence that evidence is complete.
      - id: full
        label: Full Vision
        name: Continuous Assurance
        summary: Continuously test automatable controls and prioritize exceptions so remediation begins before the next audit cycle.
        work_packages: [audit_full_placeholder]
        deliverables:
          - Automated tests for high-value controls with documented logic and human review points.
          - A control-health view that prioritizes exceptions by severity, duration, and business impact.
          - Automated escalation and source-linked assurance packages for management and auditors.
        kpis:
          - label: Continuous control coverage
            target: 70-85% of controls determined to be technically automatable
            context: Coverage should expand only after test logic and evidence quality are validated with control owners.
          - label: Audit cycle effort
            target: 30-50% reduction in preparation and evidence follow-up time
            context: Preserve auditor review and management judgment while reducing repetitive collection and reconciliation.
        impact: { efficiency: 5, risk_reduction: 5, decision_visibility: 5, scalability: 5 }
        risks:
          - Incorrect control logic or overreliance on automated tests could allow a material issue to go unchallenged.
          - Alert volume may exceed remediation capacity unless severity thresholds and ownership are actively managed.

assumptions:
  - Network Automation Stops 1 and 2 use supplied draft inputs; all other content is a best-guess planning draft.
  - KPI targets are directional ranges and require current-state baselines before they become commitments.
  - Time, staffing, confidence, and risk ranges are illustrative until reviewed by delivery owners and subject-matter experts.
  - Source-system access, supported APIs, security approval, and available subject-matter experts are assumed.
  - Parallel mode assumes dependency-ready work can start without a shared capacity ceiling.
  - Each selected stop includes the work from every prior stop on the same path.
