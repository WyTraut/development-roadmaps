portfolio:
  title: Technology Portfolio Roadmaps
  subtitle: Model delivery depth, investment, and organizational capacity across three internal IT paths.
  program_label: Roadmap planning
  currency: USD
  last_updated: "2026-07-15"
  illustrative: true
  source_note: Working draft. Network Automation uses supplied inputs; Reporting and Audit Automation use planning assumptions that require owner validation.

defaults:
  selections:
    network_automation: none
    reporting: none
    audit_automation: none
  execution_mode: parallel

metrics_sources:
  - id: l2l_scrubber
    name: Activations Scrub Tool
    source_type: github_issue
    repository: WyattTrautman/L2L-Scrubber
    issue_number: 1
    display_mode: aggregate
    requires_auth: true
    minutes_saved_per_warehouse_query: 2
    purpose: Adoption and value evidence from real-world scrubber usage, independent of roadmap scenario selections.

reporting_suite_source:
  id: reporting_suite
  name: Reporting Suite
  repository: WyTraut/Private
  ref: main
  requires_auth: true
  page_registry_path: shared/page_registry.json
  server_path: server.py
  database_path: shared/db.py
  fallback_snapshot_path: reporting_suite_snapshot.json
  metrics_issue:
    id: reporting_suite_usage
    repository: WyTraut/development-roadmaps
    issue_number: 29
    requires_auth: false
  purpose: Code-derived evidence of the reporting platform's built-in reach and automation.

impact_dimensions:
  - key: efficiency
    label: Efficiency
    description: Reduction in manual effort, delays, and operational friction.
  - key: risk_reduction
    label: Risk reduction
    description: Improvement in reliability, controls, and audit readiness.
  - key: decision_visibility
    label: Decision visibility
    description: Timeliness and usefulness of information for leaders and operators.
  - key: scalability
    label: Scalability
    description: Ability to support more volume and complexity without proportional staffing.

