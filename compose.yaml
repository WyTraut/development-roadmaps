services:
  roadmap-portfolio:
    build: .
    ports:
      - "8080:8080"
    environment:
      ROADMAP_DATA: /app/data/roadmaps.yaml
      FRONTEND_DIST: /app/frontend/dist
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
